ai_usage_summary: |
  Used the Antigravity agent for architectural planning, refactoring the modular retrieval logic, optimizing dataframe performance (achieving a 28x speedup from 7s to 0.25s for candidate filtering using Pandas merge), designing the custom Streamlit CSS dark mode sandbox, and writing comprehensive test suites. No candidate data was sent to external APIs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A robust four-layer candidate ranking pipeline optimized for offline execution. Layer 1 hard-filters adversarial/consulting-only traps and flags honeypots (0.045% rate). Layer 2 merges lexical (BM25 Okapi) and semantic (MiniLM-L6-v2 embeddings) similarities precomputed offline. Layer 3 evaluates structured roles (enforceable 47-title taxonomy) and endorsement/duration-weighted skill trust. Layer 4 scales scores by platform availability and response rates. Strict tie-breakers and float adjustments prevent rank order errors. Completes in ~87 seconds with a footprint of ~0.32 GB RAM.

